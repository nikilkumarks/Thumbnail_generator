services:
  - type: web
    name: promptvision-studio
    runtime: node
    plan: free
    buildCommand: npm ci --prefix frontend --include=dev && npm ci --prefix backend --omit=dev && npm run build --prefix frontend
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
